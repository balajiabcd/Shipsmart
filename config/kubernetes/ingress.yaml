apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shipsmart-ingress
  namespace: shipsmart
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
  - host: shipsmart.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: shipsmart-api
            port:
              number: 80
      - path: /ml
        pathType: Prefix
        backend:
          service:
            name: shipsmart-ml
            port:
              number: 8001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shipsmart-frontend
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shipsmart-ingress-external
  namespace: shipsmart
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/tls-acme: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - shipsmart.example.com
    secretName: shipsmart-tls
  rules:
  - host: shipsmart.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: shipsmart-api
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shipsmart-frontend
            port:
              number: 80