apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shipsmart-api-network-policy
  namespace: shipsmart
spec:
  podSelector:
    matchLabels:
      app: shipsmart-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: shipsmart-frontend
    - podSelector:
        matchLabels:
          app: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: shipsmart-postgres
    - podSelector:
        matchLabels:
          app: shipsmart-redis
    - podSelector:
        matchLabels:
          app: shipsmart-ml
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shipsmart-ml-network-policy
  namespace: shipsmart
spec:
  podSelector:
    matchLabels:
      app: shipsmart-ml
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: shipsmart-api
    ports:
    - protocol: TCP
      port: 8001
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: shipsmart-models
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shipsmart-frontend-network-policy
  namespace: shipsmart
spec:
  podSelector:
    matchLabels:
      app: shipsmart-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: shipsmart-api