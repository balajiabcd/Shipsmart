apiVersion: v1
kind: Service
metadata:
  name: shipsmart-api
  namespace: shipsmart
spec:
  type: ClusterIP
  selector:
    app: shipsmart-api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: shipsmart-ml
  namespace: shipsmart
spec:
  type: ClusterIP
  selector:
    app: shipsmart-ml
  ports:
  - name: grpc
    port: 8001
    targetPort: 8001
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: shipsmart-frontend
  namespace: shipsmart
spec:
  type: ClusterIP
  selector:
    app: shipsmart-frontend
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: shipsmart-postgres
  namespace: shipsmart
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: shipsmart-redis
  namespace: shipsmart
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP 
