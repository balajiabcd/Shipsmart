version: '3.8'

services:
  spark-master:
    image: bitnami/spark:3.4.1
    container_name: shipsmart-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_SECURITY_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
    volumes:
      - spark-logs:/opt/bitnami/spark/logs
    networks:
      - shipsmart-network

  spark-worker-1:
    image: bitnami/spark:3.4.1
    container_name: shipsmart-spark-worker-1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    networks:
      - shipsmart-network

  spark-worker-2:
    image: bitnami/spark:3.4.1
    container_name: shipsmart-spark-worker-2
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    networks:
      - shipsmart-network

volumes:
  spark-logs:

networks:
  shipsmart-network:
    driver: bridge