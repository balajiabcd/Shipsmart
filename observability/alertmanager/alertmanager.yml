global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'alerts@shipsmart.com'
        send_resolved: true
        headers:
          from: 'alertmanager@shipsmart.com'
          subject: '[Shipsmart] Alert: {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK'
        channel: '#alerts'
        send_resolved: true
        title: '[Shipsmart] {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    webhook_configs:
      - url: 'http://shipsmart-alerts:8080/webhook'
        send_resolved: true

  - name: 'critical-receiver'
    email_configs:
      - to: 'critical-alerts@shipsmart.com'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK'
        channel: '#critical-alerts'
        send_resolved: true

  - name: 'warning-receiver'
    email_configs:
      - to: 'warnings@shipsmart.com'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'namespace']