groups:
  - name: shipsmart-alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for {{ $value }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is above 2s"

      - alert: APIDown
        expr: up{job="shipsmart-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API service is down"
          description: "API has been down for 1 minute"

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 85%"

      - alert: HighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total[5m])) > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80%"

      - alert: PodRestartingTooMuch
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod restarting too frequently"
          description: "Pod is restarting too often"

      - alert: PredictionFailureRate
        expr: rate(shipsmart_predictions_total{status="failure"}[5m]) > 0.01
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High prediction failure rate"
          description: "ML prediction failures above 1%"

      - alert: AlertFiring
        expr: shipsmart_alerts_firing > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Active alerts in system"
          description: "There are {{ $value }} firing alerts"