global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'shipsmart'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'shipsmart-api'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - shipsmart
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: shipsmart-api
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  - job_name: 'shipsmart-ml'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - shipsmart
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: shipsmart-ml

  - job_name: 'shipsmart-frontend'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - shipsmart
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: shipsmart-frontend

  - job_name: 'node-exporter'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  - job_name: 'cadvisor'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  - job_name: 'kube-state-metrics'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: kube-state-metrics